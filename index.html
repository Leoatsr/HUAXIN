  <style>
    /* ─── Pre-React loading screen ─── */
    html, body { margin:0; padding:0; background:#f4ece0; }
    body { font-family:'Noto Serif SC','Songti SC',serif; color:#3a2818; }
    #app-loader {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:linear-gradient(155deg,#f4ece0,#ebe0d0);
      z-index:9999; transition:opacity .5s;
    }
    #app-loader.loaded { opacity:0; pointer-events:none; }
    .loader-flower {
      width:60px; height:60px;
      animation:sway 2s ease-in-out infinite;
    }
    @keyframes sway {
      0%,100% { transform:rotate(-5deg) scale(1); }
      50% { transform:rotate(5deg) scale(1.05); }
    }
    .loader-title {
      font-size:24px; font-weight:900; letter-spacing:8px;
      color:#2a2018; margin-top:20px;
    }
    .loader-subtitle {
      font-size:11px; letter-spacing:3px;
      color:#8a7a60; margin-top:6px;
    }
    .loader-bar {
      width:120px; height:2px; background:rgba(192,96,64,.15);
      border-radius:1px; overflow:hidden; margin-top:24px;
    }
    .loader-bar::after {
      content:''; display:block; width:40%; height:100%;
      background:linear-gradient(90deg,#c06040,#e0a040);
      animation:slide 1.2s ease-in-out infinite;
    }
    @keyframes slide {
      0% { margin-left:-40%; }
      100% { margin-left:100%; }
    }
    #root { min-height:100vh; }
    
    /* ─── NoScript fallback ─── */

    </div>
  </noscript>
  
  <!-- Remove loader when React mounts -->
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        var loader = document.getElementById('app-loader');
        if (loader) {
          loader.classList.add('loaded');
          setTimeout(function() { loader.remove(); }, 500);
        }
      }, 300);
    });
    
    /* ─── Basic Analytics Event Bus ─── */
    window._hxTrack = function(event, data) {
      try {
        console.log('[花信风]', event, data || '');
        // Forward to Google Analytics 4 if loaded
        if (typeof window.gtag === 'function') {
          window.gtag('event', event, data || {});
        }
        // Forward to Umami if loaded
        if (window.umami && typeof window.umami.track === 'function') {
          window.umami.track(event, data || {});
        }
        // Forward to PostHog if loaded
        if (window.posthog && typeof window.posthog.capture === 'function') {
          window.posthog.capture(event, data || {});
        }
      } catch(e) {
        console.warn('[花信风] analytics error:', e);
      }
    };
  </script>
